{% extends 'base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<form method="post" action="{{ action_url }}">
  <div class="mb-3">
    <label for="name" class="form-label">اسم الفئة</label>
    <input type="text" class="form-control" id="name" name="name" value="{{ category.name if category else '' }}" required>
  </div>
  <div class="mb-3">
    <label for="type" class="form-label">النوع</label>
    <select class="form-select" id="type" name="type" required>
      <option value="Revenue" {% if category and category.type == 'Revenue' %}selected{% endif %}>إيراد</option>
      <option value="Expense" {% if category and category.type == 'Expense' %}selected{% endif %}>مصروف</option>
    </select>
  </div>
  <button type="submit" class="btn btn-primary">حفظ</button>
  <a href="{{ url_for('list_categories') }}" class="btn btn-secondary">إلغاء</a>
</form>
{% endblock %}
