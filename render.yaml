services:
  - type: web
    name: construction-backend
    env: node
    plan: free
    buildCommand: cd backend && npm ci --include=dev && npx prisma generate && npm run build:full
    startCommand: cd backend && node dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        value: file:./dev.db
    autoDeploy: true
