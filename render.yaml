services:
  - type: web
    name: construction-backend
    env: node
    plan: free
    buildCommand: cd backend && npm ci --include=dev && npx prisma generate && npm run build:full
    startCommand: cd backend && (npx prisma migrate deploy || npx prisma db push) && node dist/src/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        value: "postgresql://neondb_owner:npg_VlDF3zZpfIg4@ep-wispy-morning-ad2f7q2s-pooler.c-2.us-east-1.aws.neon.tech/neondb?sslmode=require"
    autoDeploy: true
