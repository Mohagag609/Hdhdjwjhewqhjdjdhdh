services:
  # Backend API Service (Free Plan)
  - type: web
    name: treasury-backend
    env: node
    buildCommand: cd backend && npm ci --only=production
    startCommand: cd backend && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        value: postgresql://neondb_owner:npg_l7ABpvfRoE6b@ep-empty-snow-adpqm6pu-pooler.c-2.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          type: web
          name: treasury-frontend
          property: host
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100

  # Frontend Web Service
  - type: web
    name: treasury-frontend
    env: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: treasury-backend
          property: host
      - key: REACT_APP_APP_NAME
        value: Treasury Management System
      - key: REACT_APP_VERSION
        value: 1.0.0

# Using external Neon database - no local database needed