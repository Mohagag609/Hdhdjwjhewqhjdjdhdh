services:
  - type: web
    name: construction-backend
    env: node
    plan: free
    buildCommand: cd backend && npm ci --include=dev && npx prisma generate && npm run build:full
    startCommand: cd backend && npx prisma db push && node dist/src/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        value: file:/tmp/dev.db
    autoDeploy: true

  - type: web
    name: construction-simple-api
    env: python
    plan: free
    rootDir: simple_api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true

  - type: web
    name: construction-one-app
    env: python
    plan: free
    rootDir: one_app
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    autoDeploy: true
