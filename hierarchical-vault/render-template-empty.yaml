services:
  # الخدمة الموحدة (Backend + Frontend)
  - type: web
    name: hierarchical-vault
    env: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_HOST
        value: "" # ضع هنا معلومات Neon Host
      - key: DB_PORT
        value: 5432
      - key: DB_NAME
        value: "" # ضع هنا اسم قاعدة البيانات
      - key: DB_USER
        value: "" # ضع هنا اسم المستخدم
      - key: DB_PASSWORD
        value: "" # ضع هنا كلمة المرور
      - key: DB_SSL
        value: true
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: CORS_ORIGIN
        value: https://hierarchical-vault.onrender.com