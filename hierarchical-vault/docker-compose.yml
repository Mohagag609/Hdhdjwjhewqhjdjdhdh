version: '3.8'

services:
  # قاعدة البيانات PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: hierarchical-vault-db
    environment:
      POSTGRES_DB: hierarchical_vault
      POSTGRES_USER: hierarchical_vault_user
      POSTGRES_PASSWORD: hierarchical_vault_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema-postgresql.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - hierarchical-vault-network

  # الخادم الخلفي
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hierarchical-vault-backend
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: hierarchical_vault
      DB_USER: hierarchical_vault_user
      DB_PASSWORD: hierarchical_vault_password
      JWT_SECRET: your_super_secret_jwt_key_here
      JWT_EXPIRES_IN: 24h
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      - db
    networks:
      - hierarchical-vault-network

  # الواجهة الأمامية
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hierarchical-vault-frontend
    environment:
      VITE_API_URL: http://localhost:5000/api
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - hierarchical-vault-network

volumes:
  postgres_data:

networks:
  hierarchical-vault-network:
    driver: bridge