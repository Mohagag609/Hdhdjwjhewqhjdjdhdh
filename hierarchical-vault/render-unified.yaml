services:
  # الخدمة الموحدة (Backend + Frontend)
  - type: web
    name: hierarchical-vault
    env: node
    plan: free
    region: oregon
    buildCommand: npm run install:all && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_HOST
        value: YOUR_NEON_HOST_HERE # استبدل بمعلومات Neon الخاصة بك
      - key: DB_PORT
        value: 5432
      - key: DB_NAME
        value: YOUR_NEON_DATABASE_HERE # استبدل باسم قاعدة البيانات
      - key: DB_USER
        value: YOUR_NEON_USERNAME_HERE # استبدل باسم المستخدم
      - key: DB_PASSWORD
        value: YOUR_NEON_PASSWORD_HERE # استبدل بكلمة المرور
      - key: DB_SSL
        value: true # Enable SSL for Neon
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: CORS_ORIGIN
        value: https://hierarchical-vault.onrender.com # Frontend URL